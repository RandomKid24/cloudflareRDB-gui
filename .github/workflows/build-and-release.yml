name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: linux
            build_command: npm run electron:build:linux -- --publish never
          - os: windows-latest
            label: Windows (native RDP)
            artifact_name: windows
            build_command: npm run electron:build -- --win nsis --publish never
          - os: macos-latest
            label: macOS
            artifact_name: macos
            build_command: npm run electron:build:mac -- --dmg --zip --publish never

    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Print versions
        run: |
          node -v
          npm -v
          cmake --version || true

      - name: Install dependencies
        run: npm ci

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-freerdp-v2
          restore-keys: |
            vcpkg-freerdp-

      - name: Install FreeRDP (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y freerdp2-dev

      - name: Install FreeRDP (macOS)
        if: runner.os == 'macOS'
        run: brew install freerdp

      - name: Install FreeRDP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg"
          echo "VCPKG_INSTALLATION_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          if (!(Test-Path "$vcpkgRoot\installed\x64-windows\share\freerdp\FreeRDPConfig.cmake")) {
            & "$vcpkgRoot\vcpkg" install freerdp:x64-windows --no-binarycaching
          } else {
            Write-Host "freerdp already installed, skipping"
          }
          & "$vcpkgRoot\vcpkg" integrate install

      - name: Verify freerdp installed (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== freerdp share dir ==="
          dir C:\vcpkg\installed\x64-windows\share\freerdp -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "=== cmake toolchain ==="
          Test-Path C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build desktop artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.build_command }}

      - name: Verify addon compiled (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path -Path "native/rdp-addon/build/Release/rdp_addon.node") {
            Write-Host "rdp_addon.node compiled and packaged"
          } else {
            Write-Host "rdp_addon.node not found in build output"
            exit 1
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*-mac.zip
            release/*.AppImage
            release/*.deb
            release/*.snap
            release/*.7z
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Compute release tag
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG="${TAG}-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=TunnelGate ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish release with all artifacts
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=()
          for p in dist-artifacts/**/*; do
            if [[ -f "$p" ]]; then
              files+=("$p")
            fi
          done
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release files found."
            exit 1
          fi
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "$RELEASE_TITLE" \
            --notes "Automated release from push to main for commit ${GITHUB_SHA}."
