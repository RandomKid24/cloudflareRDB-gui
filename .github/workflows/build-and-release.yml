name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: linux
            build_command: npm run electron:build:linux -- --publish never
          - os: windows-latest
            label: Windows (native RDP)
            artifact_name: windows
            build_command: npm run electron:build -- --win nsis --publish never
          - os: macos-latest
            label: macOS
            artifact_name: macos
            build_command: npm run electron:build:mac -- --publish never

    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Print versions
        run: |
          node -v
          npm -v
          cmake --version || true

      - name: Install dependencies
        run: npm ci

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-freerdp-2.11.2-v4

      - name: Install FreeRDP (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y freerdp2-dev

      - name: Install FreeRDP (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Build FreeRDP 2.11.7 from source (brew ships 3.x, addon needs 2.x)
          curl -sL https://github.com/FreeRDP/FreeRDP/archive/refs/tags/2.11.7.tar.gz | tar xz
          cd FreeRDP-2.11.7
          cmake -B build \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local/freerdp2 \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-no_fixup_chains" \
            -DWITH_SERVER=OFF \
            -DWITH_WAYLAND=OFF \
            -DWITH_X11=OFF \
            -DWITH_SDL2=OFF \
            -DWITH_OPENSSL=ON \
            -DWITH_ALSA=OFF \
            -DWITH_PULSE=OFF \
            -DWITH_CUPS=OFF \
            -DWITH_PCSC=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_SWSCALE=OFF \
            -DWITH_FAAC=OFF \
            -DWITH_FAAD2=OFF \
            -DWITH_GSM=OFF \
            -DWITH_JPEG=OFF \
            -DWITH_LAME=OFF \
            -DWITH_OPUS=OFF \
            -DWITH_SPEEX=OFF \
            -DWITH_WEBRTC=OFF \
            -DWITH_CLIENT_MACAQUA=OFF \
            -DWITH_CLIENT_MAC=OFF \
            -DWITH_CLIENT_SDL=OFF \
            -DWITH_CLIENT_X11=OFF \
            -DWITH_CLIENT_HEADLESS=OFF \
            -DWITH_WINPR_TOOLS=OFF
          cmake --build build -j$(sysctl -n hw.logicalcpu) --target freerdp --target freerdp-client --target winpr
          sudo cmake --install build --prefix /usr/local/freerdp2
          # Remove the source to save disk space
          cd .. && rm -rf FreeRDP-2.11.7 build
          echo "FREERDP_ROOT=/usr/local/freerdp2" >> $GITHUB_ENV

      - name: Install FreeRDP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg"
          echo "VCPKG_INSTALLATION_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "=== Pinning freerdp port to 2.11.2 ==="
          pushd "$vcpkgRoot"
          git checkout 389178885d7060149235e37f9ef005265f9d0d22 -- ports/freerdp
          if ($LASTEXITCODE -ne 0) {
            Write-Host "git checkout failed, continuing with current port files"
          }
          popd

          Write-Host "=== Installing FreeRDP via vcpkg ==="
          & "$vcpkgRoot\vcpkg" install freerdp:x64-windows --no-binarycaching --classic
          if ($LASTEXITCODE -ne 0) {
            Write-Host "vcpkg install failed!"
            exit 1
          }

          & "$vcpkgRoot\vcpkg" integrate install
          Write-Host "=== FreeRDP install complete ==="

      - name: Verify freerdp installed (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== freerdp share dir ==="
          dir C:\vcpkg\installed\x64-windows\share\freerdp -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "=== cmake toolchain ==="
          Test-Path C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build desktop artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.build_command }}

      - name: Verify addon compiled (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path -Path "native/rdp-addon/build/Release/rdp_addon.node") {
            Write-Host "rdp_addon.node compiled and packaged"
          } else {
            Write-Host "rdp_addon.node not found in build output"
            exit 1
          }

      - name: Verify addon compiled (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -f "native/rdp-addon/build/Release/rdp_addon.node" ]; then
            echo "rdp_addon.node compiled and packaged"
          else
            echo "rdp_addon.node not found in build output"
            exit 1
          fi

      - name: Verify addon compiled (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -f "native/rdp-addon/build/Release/rdp_addon.node" ]; then
            echo "rdp_addon.node compiled and packaged"
          else
            echo "rdp_addon.node not found in build output"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*-mac.zip
            release/*.AppImage
            release/*.deb
            release/*.snap
            release/*.7z
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Compute release tag
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG="${TAG}-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=TunnelGate ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish release with all artifacts
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=()
          for p in dist-artifacts/**/*; do
            if [[ -f "$p" ]]; then
              files+=("$p")
            fi
          done
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release files found."
            exit 1
          fi
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "$RELEASE_TITLE" \
            --notes "Automated release from push to main for commit ${GITHUB_SHA}."
