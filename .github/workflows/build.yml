name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Print versions
        run: |
          node -v
          npm -v
          cmake --version || true

      - name: Install dependencies
        run: npm ci

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-freerdp-2.11.2-v6-${{ hashFiles('vcpkg-overlay/ports/freerdp/**') }}

      - name: Install FreeRDP
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg"
          echo "VCPKG_INSTALLATION_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "=== Normalizing patch line endings to LF ==="
          Get-ChildItem -Path "${{ github.workspace }}\vcpkg-overlay\ports\freerdp\*.patch" | ForEach-Object {
              $content = [System.IO.File]::ReadAllText($_.FullName) -replace "`r`n", "`n"
              [System.IO.File]::WriteAllText($_.FullName, $content, (New-Object System.Text.UTF8Encoding $false))
              Write-Host "Normalized: $($_.Name)"
          }

          Write-Host "=== Installing FreeRDP via vcpkg overlay (WITH_NATIVE_SSPI=OFF) ==="
          & "$vcpkgRoot\vcpkg" install freerdp:x64-windows --no-binarycaching --classic --overlay-ports="${{ github.workspace }}\vcpkg-overlay\ports"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "vcpkg install failed!"
            exit 1
          }

          & "$vcpkgRoot\vcpkg" integrate install
          Write-Host "=== FreeRDP install complete ==="

      - name: Verify freerdp installed
        shell: pwsh
        run: |
          Write-Host "=== freerdp share dir ==="
          dir C:\vcpkg\installed\x64-windows\share\freerdp -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "=== cmake toolchain ==="
          Test-Path C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build desktop artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run electron:build -- --win nsis --publish never

      - name: Verify addon compiled
        shell: pwsh
        run: |
          if (Test-Path -Path "native/rdp-addon/build/Release/rdp_addon.node") {
            Write-Host "rdp_addon.node compiled and packaged"
          } else {
            Write-Host "rdp_addon.node not found in build output"
            exit 1
          }
          if (Test-Path -Path "native/rdp-addon/build/Release/ossl-modules/legacy.dll") {
            Write-Host "ossl-modules/legacy.dll present"
          } else {
            Write-Host "WARNING: ossl-modules/legacy.dll NOT found"
          }
          $missing = @()
          foreach ($dll in @("msvcp140.dll","vcruntime140.dll","vcruntime140_1.dll")) {
            if (Test-Path -Path "native/rdp-addon/build/Release/$dll") {
              Write-Host "$dll present"
            } else {
              Write-Host "WARNING: $dll NOT found"
              $missing += $dll
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host "CRITICAL: VC runtime DLLs missing: $($missing -join ', ')"
            exit 1
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.7z
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish release with all artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $TAG = "$env:GITHUB_REF_NAME"
          $files = Get-ChildItem -Recurse -File dist-artifacts | Select-Object -ExpandProperty FullName
          if ($files.Count -eq 0) {
            Write-Host "No release files found."
            exit 1
          }
          gh release create $TAG $files --target "$env:GITHUB_SHA" --title "TunnelGate $TAG" --notes "Automated release for $TAG."
