appId: com.tunnelgate.app
productName: TunnelGate
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - resources/icons/**/*
  - package.json
extraResources:
  - from: resources/
    to: resources/
    filter:
      - "cloudflared*"
  - from: native/
    to: native/
    filter:
      - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.png
mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icons/icon.png
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false
  # NOTE: hardened runtime is applied via manual codesign after build
  # because electron-builder's re-signing corrupts Electron Framework on macOS 26.
  # Run: codesign --deep --force --sign - --options runtime --entitlements build/entitlements.mac.plist TunnelGate.app
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icons/
  category: Utility
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
publish: null
